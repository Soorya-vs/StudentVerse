{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h1>Edit Event</h1>

    <form method="POST">

        <input type="text"
               name="title"
               value="{{ event.title }}"
               class="form-control mb-3">

        <textarea
            name="description"
            class="form-control mb-3">{{ event.description }}</textarea>

        <input type="date"
               name="date"
               value="{{ event.date }}"
               class="form-control mb-3">

        <button class="btn btn-success">

            Save Changes

        </button>

    </form>

</div>

{% endblock %}
