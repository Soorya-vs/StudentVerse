{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h1>Edit Notice</h1>

<form method="POST">

```
<input type="text"
       name="title"
       value="{{ notice.title }}"
       class="form-control mb-3">

<textarea
        name="content"
        class="form-control mb-3">{{ notice.content }}</textarea>

<input type="url"
       name="link"
       value="{{ notice.link }}"
       class="form-control mb-3"
       placeholder="External Link">

<button class="btn btn-success">

    Save Changes

</button>
```

</form>

</div>

{% endblock %}
