{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h1>{{ community.name }} Members</h1>

    <table class="table table-bordered">

        <tr>
            <th>Name</th>
            <th>Action</th>
        </tr>

        {% for member in memberships %}

        <tr>

            <td>
                {{ User.query.get(member.user_id).name }}
            </td>

            <td>

                <a href="/remove-member/{{ member.id }}"
                   class="btn btn-danger">

                    Remove

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
