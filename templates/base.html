<!DOCTYPE html>
<html>

<head>

    <title>StudentVerse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <link rel="stylesheet"
      href="{{ url_for('static',
      filename='css/styles.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark"
     style="background:#ededed;">

    <div class="container">

        <a class="navbar-brand" href="/">
            🎓 StudentVerse
        </a>

        <div class="ms-auto">

            {% if session.get("role") == "admin" %}

                <a href="/admin"
                   class="btn btn-light me-2">
                    Admin Dashboard
                </a>

                <a href="/admin/students"
                   class="btn btn-light me-2">
                    Students
                </a>

                <a href="/logout"
                   class="btn btn-danger">
                    Logout
                </a>

            {% elif session.get("user_id") %}

                <a href="/dashboard"
                   class="btn btn-light me-2">
                    Dashboard
                </a>

                <a href="/communities"
                   class="btn btn-light me-2">
                    Communities
                </a>

                <a href="/my-communities"
                   class="btn btn-light me-2">
                    My Communities
                </a>

                <a href="/profile"
                   class="btn btn-light me-2">
                    Profile
                </a>

                <a href="/logout"
                   class="btn btn-danger">
                    Logout
                </a>

            {% else %}

                <a href="/"
                   class="btn btn-light me-2">
                    Home
                </a>

                <a href="/login"
                   class="btn btn-light me-2">
                    Login
                </a>

                <a href="/register"
                   class="btn btn-light me-2">
                    Register
                </a>

                <a href="/admin-login"
                   class="btn btn-warning">
                    Admin Login
                </a>

            {% endif %}

        </div>

    </div>

</nav>

{% block content %}
{% endblock %}

</body>

</html>
