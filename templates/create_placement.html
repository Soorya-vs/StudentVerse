{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h3 class="page-title">Create Placement</h3>

<form method="POST">

    <input type="text"
           name="company"
           class="form-control mb-3"
           placeholder="Company Name">

    <input type="text"
           name="role"
           class="form-control mb-3"
           placeholder="Job Role">

    <input type="text"
           name="package"
           class="form-control mb-3"
           placeholder="Package">

    <input type="text"
           name="deadline"
           class="form-control mb-3"
           placeholder="Application Deadline">

    <input type="url"
           name="link"
           class="form-control mb-3"
           placeholder="Apply Link">

    <input type="text"
            name="eligibility"
            class="form-control mb-3"
            placeholder="Eligibility">   

    <textarea
            name="description"
            class="form-control mb-3"
            placeholder="Job Description">
    </textarea>

    <button class="btn btn-success">

        Create Placement

    </button>

</form>

</div>

{% endblock %}
