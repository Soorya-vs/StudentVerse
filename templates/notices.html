{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h3 class="page-title">Notices</h3>

    {% for notice in notices %}

    <div class="card notice-card shadow">

        <div class="row g-4 align-items-center">

            {% if notice.image %}
            <div class="col-md-4 text-center">

                <a href="{{ url_for(
                    'static',
                    filename='uploads/notices/' + notice.image
                ) }}"
                target="_blank">

                    <img src="{{ url_for(
                        'static',
                        filename='uploads/notices/' + notice.image
                    ) }}"
                    class="notice-image">

                </a>

            </div>
            {% endif %}

            <div class="col-md-8 notice-content">

                <h4 class="notice-title">
                    {{ notice.title }}
                </h4>

                <p class="notice-description">
                    {{ notice.content }}
                </p>

                {% if notice.link %}
                <a href="{{ notice.link }}"
                   target="_blank"
                   class="btn btn-primary me-2">

                    Open Link

                </a>
                {% endif %}

                {% if session.get("role") == "admin" %}

                <div class="mt-3">

                    <a href="/edit-notice/{{ notice.id }}"
                       class="btn btn-warning me-2">

                        Edit

                    </a>

                    <a href="/delete-notice/{{ notice.id }}"
                       class="btn btn-danger">

                        Delete

                    </a>

                </div>

                {% endif %}

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
