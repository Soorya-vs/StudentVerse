{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h1 class="sv-title">
        {{ community.name }} Updates
    </h1>

    {% if notices %}

        {% for notice in notices %}

        <div class="card community-card p-4 mb-3">

            <h4>{{ notice.title }}</h4>

            <p>{{ notice.content }}</p>

        </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-info">
            No updates available.
        </div>

    {% endif %}

</div>

{% endblock %}
